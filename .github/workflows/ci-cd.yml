name: pollycasso-ci-cd

on:
  push:
    branches: ['main', 'develop']
  pull_request:
    branches: ['main', 'develop']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/pollycasso

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint test
        run: npm run lint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and conditionally push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    needs: build-and-check
    runs-on: [self-hosted, pollycasso-runner]
    env:
      DEPLOY_DIR: /home/ubuntu/10term-pollycasso-back
      COMPOSE_FILE: docker-compose.yml
      BRANCH_TAG: ${{ github.ref_name }}-latest
    steps:
      - name: Restart via docker compose
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          echo "배포 시작 - 브랜치: ${{ github.ref_name }}"
          echo "이미지 가져오기 및 컨테이너 재시작 중..."
          IMAGE_TAG=${{ env.BRANCH_TAG }} docker compose -f "$COMPOSE_FILE" up -d --pull always
          echo "배포 완료!"
