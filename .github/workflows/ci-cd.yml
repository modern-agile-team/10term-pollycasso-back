name: pollycasso-ci-cd

on:
  push:
    branches: ['main', 'develop']
  pull_request:
    branches: ['main', 'develop']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/pollycasso

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint test
        run: npm run lint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
          # main 브랜치인 경우 latest 태그를, develop 브랜치인 경우 develop-latest 태그를 추가
            type=raw,value=latest,enable={{branch == 'main'}}
            type=raw,value=develop-latest,enable={{branch == 'develop'}}
            type=sha

      - name: Build and conditionally push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    needs: build-and-check
    runs-on: [self-hosted, pollycasso-runner]
    env:
      DEPLOY_DIR: /home/ubuntu/10term-pollycasso-back
      COMPOSE_FILE: docker-compose.yml
      IMAGE_TAG: ${{ github.ref == 'refs/heads/main' && 'latest' || 'develop-latest' }}
    steps:
      - name: Restart via docker compose
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          echo "배포 시작 - 브랜치: ${{ github.ref_name }}"
          echo "배포 이미지: ${IMAGE_NAME}:${IMAGE_TAG}"
          IMAGE_NAME=${IMAGE_NAME} IMAGE_TAG=${IMAGE_TAG} docker compose -f "$COMPOSE_FILE" up -d --pull always
          echo "배포 완료!"
